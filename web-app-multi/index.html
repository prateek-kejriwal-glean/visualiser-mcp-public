<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multi-Chart Visualiser</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light dark;
        /* Glean semantic tokens (Colors/sprinkles/button semantics). */
        --background-base: #f6f3eb;
        --surface-base: #ffffff;
        --surface-base-hover: color-mix(in srgb, #0c0c11 5%, transparent);
        --surface-base-active: color-mix(in srgb, #0c0c11 9%, transparent);
        --border-base: #e6e2d8;
        --text-strong: #0c0c11;
        --text-primary: #0c0c11;
        --text-secondary: #5c5c6e;
        --text-weak: #777767;
        --button-primary-base: #343ced;
        --button-primary-hover: #2a30c4;
        --button-primary-active: #252cab;
        --button-primary-foreground: #ffffff;
        --focus-visible-color: #1e6aed;
        --focus-visible-offset: -1px;
        --shadow-xs-border-base: 0 1px 2px rgba(12, 12, 17, 0.06), 0 4px 12px rgba(12, 12, 17, 0.04);
        --card-bg: color-mix(in srgb, var(--button-primary-base) 4.5%, var(--surface-base));
        --chart-tick: #3a3a45;
        --chart-grid: rgba(12, 12, 17, 0.08);
        --chart-slice-border: rgba(255, 255, 255, 0.88);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --background-base: #0c0c11;
          --surface-base: #141419;
          --surface-base-hover: color-mix(in srgb, #eeeef5 6%, transparent);
          --surface-base-active: color-mix(in srgb, #eeeef5 10%, transparent);
          --border-base: #2a2a34;
          --text-strong: #eeeef5;
          --text-primary: #eeeef5;
          --text-secondary: #8888a6;
          --text-weak: #6f6f8e;
          --button-primary-base: #5b7ef8;
          --button-primary-hover: #6f8ef9;
          --button-primary-active: #4c71ea;
          --button-primary-foreground: #ffffff;
          --shadow-xs-border-base: 0 1px 0 rgba(255, 255, 255, 0.06), 0 8px 24px rgba(0, 0, 0, 0.35);
          --card-bg: color-mix(in srgb, var(--button-primary-base) 10%, var(--surface-base));
          --chart-tick: #b4b4c4;
          --chart-grid: rgba(238, 238, 245, 0.08);
          --chart-slice-border: rgba(12, 12, 17, 0.5);
        }
      }
      html[data-theme='dark'] {
        --background-base: #0c0c11;
        --surface-base: #141419;
        --surface-base-hover: color-mix(in srgb, #eeeef5 6%, transparent);
        --surface-base-active: color-mix(in srgb, #eeeef5 10%, transparent);
        --border-base: #2a2a34;
        --text-strong: #eeeef5;
        --text-primary: #eeeef5;
        --text-secondary: #8888a6;
        --text-weak: #6f6f8e;
        --button-primary-base: #5b7ef8;
        --button-primary-hover: #6f8ef9;
        --button-primary-active: #4c71ea;
        --button-primary-foreground: #ffffff;
        --shadow-xs-border-base: 0 1px 0 rgba(255, 255, 255, 0.06), 0 8px 24px rgba(0, 0, 0, 0.35);
        --card-bg: color-mix(in srgb, var(--button-primary-base) 10%, var(--surface-base));
        --chart-tick: #b4b4c4;
        --chart-grid: rgba(238, 238, 245, 0.08);
        --chart-slice-border: rgba(12, 12, 17, 0.5);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
        font-optical-sizing: auto;
        font-size: 15px;
        line-height: 1.45;
        color: var(--text-primary);
        background: var(--background-base);
        -webkit-font-smoothing: antialiased;
      }
      .viz-root {
        min-height: 100%;
        padding: 16px;
      }
      #app {
        padding: 18px 20px 22px;
        max-width: 1200px;
        margin: 0 auto;
        background: var(--surface-base);
        border: 1px solid var(--border-base);
        border-radius: 12px;
        box-shadow: var(--shadow-xs-border-base);
      }
      h1 {
        font-size: 1.125rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        margin: 0 0 6px;
        color: var(--text-primary);
      }
      #hint {
        font-size: 0.8125rem;
        color: var(--text-secondary);
        margin: 0;
        font-weight: 400;
      }
      .header-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }
      .header-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .header-left {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .reset-btn {
        border: 1px solid var(--border-base);
        background: transparent;
        color: var(--text-primary);
        border-radius: 8px;
        padding: 6px 12px;
        cursor: pointer;
        font: inherit;
        font-size: 0.8125rem;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
        flex-shrink: 0;
        transition:
          background 0.15s ease,
          border-color 0.15s ease;
      }
      .reset-btn:hover {
        background: var(--surface-base-hover);
      }
      .reset-btn:focus-visible {
        outline: 2px solid var(--focus-visible-color);
        outline-offset: var(--focus-visible-offset);
      }
      .reset-btn-icon {
        display: flex;
        align-items: center;
        color: var(--text-secondary);
      }
      .reset-btn-icon svg {
        width: 16px;
        height: 16px;
      }
      .charts-grid {
        --grid-columns: 2;
        display: grid;
        grid-template-columns: repeat(var(--grid-columns), 1fr);
        gap: 12px;
        align-items: start;
      }
      .chart-card {
        border: 1px solid var(--border-base);
        border-radius: 12px;
        background: var(--card-bg);
        overflow: visible;
        min-width: 0;
        position: relative;
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease;
      }
      .chart-card.resizing {
        user-select: none;
      }
      .chart-card.dragging {
        opacity: 0.95;
        z-index: 1000;
        box-shadow: 0 12px 32px rgba(12, 12, 17, 0.18);
        cursor: grabbing;
      }
      .chart-card.drag-over {
        border-color: var(--button-primary-base);
        box-shadow: 0 0 0 2px color-mix(in srgb, var(--button-primary-base) 18%, transparent);
      }
      .drop-placeholder {
        border: 2px dashed var(--border-base);
        border-radius: 12px;
        background: color-mix(in srgb, var(--button-primary-base) 4%, var(--surface-base));
        min-height: 60px;
        transition: all 0.15s ease;
      }
      .resize-handle {
        position: absolute;
        bottom: 0;
        right: 0;
        width: 16px;
        height: 16px;
        cursor: se-resize;
        opacity: 0.45;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        color: var(--text-secondary);
        transition: opacity 0.15s;
      }
      .resize-handle:hover {
        opacity: 0.9;
        color: var(--button-primary-base);
      }
      .chart-card.collapsed .resize-handle {
        display: none;
      }
      .drag-handle {
        cursor: grab;
        padding: 4px;
        color: var(--text-secondary);
        opacity: 0.55;
        font-size: 0.75rem;
        line-height: 1;
        flex-shrink: 0;
        transition: opacity 0.15s;
      }
      .drag-handle:hover {
        opacity: 1;
        color: var(--button-primary-base);
      }
      .drag-handle:active {
        cursor: grabbing;
      }
      .chart-card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        cursor: pointer;
        user-select: none;
        gap: 6px;
        border-radius: 12px 12px 0 0;
      }
      .chart-card.collapsed .chart-card-header {
        border-radius: 12px;
      }
      .chart-card-header:hover {
        background: color-mix(in srgb, var(--button-primary-base) 6%, transparent);
      }
      .chart-card-header-left {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
        flex: 1;
      }
      .chart-card-header h2 {
        font-size: 0.875rem;
        font-weight: 600;
        margin: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        letter-spacing: -0.01em;
      }
      .chart-card-header .chart-hint {
        font-size: 0.75rem;
        color: var(--text-secondary);
        margin: 0;
        white-space: nowrap;
        flex-shrink: 0;
        font-weight: 400;
      }
      .collapse-toggle {
        background: none;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        padding: 4px;
        font-size: 0.75rem;
        line-height: 1;
        transition: transform 0.2s ease;
        flex-shrink: 0;
        border-radius: 4px;
      }
      .collapse-toggle:focus-visible {
        outline: 2px solid var(--focus-visible-color);
        outline-offset: var(--focus-visible-offset);
      }
      .collapse-toggle[aria-expanded="false"] {
        transform: rotate(-90deg);
      }
      .chart-card-body {
        padding: 0 12px 14px;
        overflow: hidden;
      }
      .chart-card-body[hidden] {
        display: none;
      }
      .chart-type-switcher {
        display: flex;
        gap: 6px;
        margin: 0 0 10px;
      }
      .chart-type-switcher button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border-base);
        background: transparent;
        color: var(--text-secondary);
        border-radius: 8px;
        width: 34px;
        height: 28px;
        cursor: pointer;
        padding: 0;
        transition:
          background 0.15s ease,
          border-color 0.15s ease,
          color 0.15s ease;
      }
      .chart-type-switcher button:hover {
        color: var(--text-primary);
        background: var(--surface-base-hover);
      }
      .chart-type-switcher button.active {
        border-color: var(--button-primary-base);
        background: var(--button-primary-base);
        color: var(--button-primary-foreground);
      }
      .chart-type-switcher button.active:hover {
        background: var(--button-primary-hover);
      }
      .chart-type-switcher button:focus-visible {
        outline: 2px solid var(--focus-visible-color);
        outline-offset: var(--focus-visible-offset);
      }
      .viz-icon {
        width: 16px;
        height: 16px;
        display: block;
      }
      .viz-icon--sm {
        width: 14px;
        height: 14px;
      }
      .table-toggle-icon {
        display: flex;
        align-items: center;
        color: inherit;
      }
      .aggregation-toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        margin: 0 0 8px;
        font-size: 0.8125rem;
      }
      .aggregation-toolbar[hidden] {
        display: none;
      }
      .aggregation-label {
        color: var(--text-secondary);
        font-weight: 500;
      }
      .aggregation-buttons {
        display: flex;
        gap: 4px;
      }
      .aggregation-buttons button {
        border: 1px solid var(--border-base);
        background: transparent;
        color: var(--text-primary);
        border-radius: 6px;
        padding: 3px 10px;
        cursor: pointer;
        font: inherit;
        font-size: 0.78rem;
        font-weight: 500;
        transition:
          background 0.15s ease,
          border-color 0.15s ease;
      }
      .aggregation-buttons button:hover {
        background: var(--surface-base-hover);
      }
      .aggregation-buttons button.active {
        border-color: var(--button-primary-base);
        background: var(--button-primary-base);
        color: var(--button-primary-foreground);
      }
      .aggregation-buttons button:focus-visible {
        outline: 2px solid var(--focus-visible-color);
        outline-offset: var(--focus-visible-offset);
      }
      .chart-wrap {
        position: relative;
        height: 200px;
        width: 100%;
      }
      .table-toggle-bar {
        margin-top: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .table-toggle-bar button {
        border: 1px solid var(--border-base);
        background: transparent;
        color: var(--text-primary);
        border-radius: 6px;
        padding: 5px 10px;
        cursor: pointer;
        font: inherit;
        font-size: 0.78rem;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 6px;
        transition:
          background 0.15s ease,
          border-color 0.15s ease;
      }
      .table-toggle-bar button:hover {
        background: var(--surface-base-hover);
      }
      .table-toggle-bar button.active {
        border-color: var(--button-primary-base);
        background: var(--button-primary-base);
        color: var(--button-primary-foreground);
      }
      .table-toggle-bar button:focus-visible {
        outline: 2px solid var(--focus-visible-color);
        outline-offset: var(--focus-visible-offset);
      }
      .data-table-wrap {
        margin-top: 10px;
        overflow-x: auto;
      }
      .data-table-wrap[hidden] {
        display: none;
      }
      .data-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.8rem;
      }
      .data-table th,
      .data-table td {
        text-align: left;
        padding: 6px 10px;
        border: 1px solid var(--border-base);
      }
      .data-table th {
        background: var(--surface-base-hover);
        font-weight: 600;
      }
      .data-table td {
        font-variant-numeric: tabular-nums;
      }
      .data-table tbody tr:hover {
        background: color-mix(in srgb, var(--text-primary) 4%, transparent);
      }
    </style>
  </head>
  <body>
    <div class="viz-root">
      <div id="app">
        <div class="header-row">
          <div class="header-left">
            <h1 id="title">Multi-Chart Visualiser</h1>
            <p id="hint">Waiting for tool input from the host…</p>
          </div>
          <div class="header-actions" id="header-actions" hidden>
            <button type="button" id="export-all-pdf-btn" class="reset-btn" aria-label="Export all charts as one PDF">
              <span class="reset-btn-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    fill="currentColor"
                    d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm4 18H6V4h7v5h5v11zM8 12h8v2H8v-2zm0 4h8v2H8v-2z"
                  />
                </svg>
              </span>
              <span>Export all (PDF)</span>
            </button>
            <button type="button" id="reset-btn" class="reset-btn" hidden>
              <span class="reset-btn-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M4 12a8 8 0 0 1 14.32-4" />
                  <path d="M20 4v5h-5" />
                </svg>
              </span>
              <span>Reset</span>
            </button>
          </div>
        </div>
        <div id="charts-grid" class="charts-grid"></div>
      </div>
    </div>
    <script type="module" src="/src/index.js"></script>
  </body>
</html>
