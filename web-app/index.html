<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chart visualiser</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Glean-inspired tokens: Electric Blue primary, Oatmeal surfaces, data-viz contrast
         (see internal design system / Company Branding docs in Glean). */
      :root {
        color-scheme: light dark;
        /* Glean semantic tokens (inspired by Colors + button.css usage). */
        --background-base: #f6f3eb;
        --surface-base: #ffffff;
        --surface-base-hover: color-mix(in srgb, #0c0c11 5%, transparent);
        --surface-base-active: color-mix(in srgb, #0c0c11 9%, transparent);
        --border-base: #e6e2d8;
        --text-strong: #0c0c11;
        --text-primary: #0c0c11;
        --text-secondary: #5c5c6e;
        --text-weak: #777767;
        --button-primary-base: #343ced;
        --button-primary-hover: #2a30c4;
        --button-primary-active: #252cab;
        --button-primary-foreground: #ffffff;
        --focus-visible-color: #1e6aed;
        --focus-visible-offset: -1px;
        --shadow-xs-border-base: 0 1px 2px rgba(12, 12, 17, 0.06), 0 4px 12px rgba(12, 12, 17, 0.04);
        --chart-tick: #3a3a45;
        --chart-grid: rgba(12, 12, 17, 0.08);
        --chart-slice-border: rgba(255, 255, 255, 0.88);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --background-base: #0c0c11;
          --surface-base: #141419;
          --surface-base-hover: color-mix(in srgb, #eeeef5 6%, transparent);
          --surface-base-active: color-mix(in srgb, #eeeef5 10%, transparent);
          --border-base: #2a2a34;
          --text-strong: #eeeef5;
          --text-primary: #eeeef5;
          --text-secondary: #8888a6;
          --text-weak: #6f6f8e;
          --button-primary-base: #5b7ef8;
          --button-primary-hover: #6f8ef9;
          --button-primary-active: #4c71ea;
          --button-primary-foreground: #ffffff;
          --shadow-xs-border-base: 0 1px 0 rgba(255, 255, 255, 0.06), 0 8px 24px rgba(0, 0, 0, 0.35);
          --chart-tick: #b4b4c4;
          --chart-grid: rgba(238, 238, 245, 0.08);
          --chart-slice-border: rgba(12, 12, 17, 0.5);
        }
      }
      html[data-theme='dark'] {
        --background-base: #0c0c11;
        --surface-base: #141419;
        --surface-base-hover: color-mix(in srgb, #eeeef5 6%, transparent);
        --surface-base-active: color-mix(in srgb, #eeeef5 10%, transparent);
        --border-base: #2a2a34;
        --text-strong: #eeeef5;
        --text-primary: #eeeef5;
        --text-secondary: #8888a6;
        --text-weak: #6f6f8e;
        --button-primary-base: #5b7ef8;
        --button-primary-hover: #6f8ef9;
        --button-primary-active: #4c71ea;
        --button-primary-foreground: #ffffff;
        --shadow-xs-border-base: 0 1px 0 rgba(255, 255, 255, 0.06), 0 8px 24px rgba(0, 0, 0, 0.35);
        --chart-tick: #b4b4c4;
        --chart-grid: rgba(238, 238, 245, 0.08);
        --chart-slice-border: rgba(12, 12, 17, 0.5);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
        font-optical-sizing: auto;
        font-size: 15px;
        line-height: 1.45;
        color: var(--text-primary);
        background: var(--background-base);
        -webkit-font-smoothing: antialiased;
      }
      .viz-root {
        min-height: 100%;
        padding: 16px;
      }
      #app {
        padding: 20px 22px 24px;
        max-width: 720px;
        margin: 0 auto;
        background: var(--surface-base);
        border: 1px solid var(--border-base);
        border-radius: 12px;
        box-shadow: var(--shadow-xs-border-base);
      }
      h1 {
        font-size: 1.125rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        margin: 0 0 8px;
        color: var(--text-primary);
      }
      #hint {
        font-size: 0.8125rem;
        color: var(--text-secondary);
        margin: 0 0 16px;
        font-weight: 400;
      }
      .chart-type-switcher {
        display: flex;
        gap: 8px;
        margin: 0 0 14px;
      }
      .chart-type-switcher button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border-base);
        background: transparent;
        color: var(--text-secondary);
        border-radius: 8px;
        width: 40px;
        height: 34px;
        cursor: pointer;
        transition:
          background 0.15s ease,
          border-color 0.15s ease,
          color 0.15s ease;
      }
      .chart-type-switcher button:hover {
        color: var(--text-primary);
        background: var(--surface-base-hover);
      }
      .chart-type-switcher button.active {
        border-color: var(--button-primary-base);
        background: var(--button-primary-base);
        color: var(--button-primary-foreground);
      }
      .chart-type-switcher button.active:hover {
        background: var(--button-primary-hover);
      }
      .chart-type-switcher button:focus-visible {
        outline: 2px solid var(--focus-visible-color);
        outline-offset: var(--focus-visible-offset);
      }
      .viz-icon {
        width: 18px;
        height: 18px;
        display: block;
      }
      .aggregation-toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        margin: 0 0 10px;
        font-size: 0.8125rem;
      }
      .aggregation-toolbar[hidden] {
        display: none;
      }
      .aggregation-label {
        color: var(--text-secondary);
        font-weight: 500;
      }
      .aggregation-buttons {
        display: flex;
        gap: 6px;
      }
      .aggregation-buttons button {
        border: 1px solid var(--border-base);
        background: transparent;
        color: var(--text-primary);
        border-radius: 8px;
        padding: 5px 12px;
        cursor: pointer;
        font: inherit;
        font-size: 0.8125rem;
        font-weight: 500;
        transition:
          background 0.15s ease,
          border-color 0.15s ease;
      }
      .aggregation-buttons button:hover {
        background: var(--surface-base-hover);
      }
      .aggregation-buttons button.active {
        border-color: var(--button-primary-base);
        background: var(--button-primary-base);
        color: var(--button-primary-foreground);
      }
      .aggregation-buttons button:focus-visible {
        outline: 2px solid var(--focus-visible-color);
        outline-offset: var(--focus-visible-offset);
      }
      .chart-wrap {
        position: relative;
        height: min(52vh, 360px);
        width: 100%;
      }
      .table-toggle-bar {
        margin-top: 16px;
        display: flex;
        align-items: center;
      }
      .table-toggle-bar button {
        border: 1px solid var(--border-base);
        background: transparent;
        color: var(--text-primary);
        border-radius: 8px;
        padding: 7px 14px;
        cursor: pointer;
        font: inherit;
        font-size: 0.8125rem;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 8px;
        transition:
          background 0.15s ease,
          border-color 0.15s ease;
      }
      .table-toggle-bar button:hover {
        background: var(--surface-base-hover);
      }
      .table-toggle-bar button.active {
        border-color: var(--button-primary-base);
        background: var(--button-primary-base);
        color: var(--button-primary-foreground);
      }
      .table-toggle-bar button:focus-visible {
        outline: 2px solid var(--focus-visible-color);
        outline-offset: var(--focus-visible-offset);
      }
      .viz-icon--sm {
        width: 16px;
        height: 16px;
      }
      .data-table-wrap {
        margin-top: 12px;
        overflow-x: auto;
      }
      .data-table-wrap[hidden] {
        display: none;
      }
      .data-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.8125rem;
      }
      .data-table th,
      .data-table td {
        text-align: left;
        padding: 9px 12px;
        border: 1px solid var(--border-base);
      }
      .data-table th {
        background: var(--surface-base-hover);
        font-weight: 600;
        color: var(--text-primary);
      }
      .data-table td {
        font-variant-numeric: tabular-nums;
      }
      .data-table tbody tr:hover {
        background: color-mix(in srgb, var(--text-primary) 4%, transparent);
      }
    </style>
  </head>
  <body>
    <div class="viz-root">
      <div id="app">
        <h1 id="title">Chart</h1>
        <div class="chart-type-switcher" id="chart-type-switcher">
          <button type="button" data-chart-type="trendline" aria-label="Trendline chart" title="Trendline">
            <svg class="viz-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M4 18 9 10l5 4 6-8"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
          <button type="button" data-chart-type="bar" aria-label="Bar chart" title="Bar">
            <svg class="viz-icon" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="4" y="12" width="4" height="8" rx="1" fill="currentColor" />
              <rect x="10" y="8" width="4" height="12" rx="1" fill="currentColor" />
              <rect x="16" y="4" width="4" height="16" rx="1" fill="currentColor" />
            </svg>
          </button>
          <button type="button" data-chart-type="pie" aria-label="Pie chart" title="Pie">
            <svg class="viz-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                fill="currentColor"
                d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10h-8V2z"
                opacity="0.4"
              />
              <path fill="currentColor" d="M12 2v10h8.9A8.5 8.5 0 0 0 12 2z" />
            </svg>
          </button>
          <button type="button" data-chart-type="donut" aria-label="Donut chart" title="Donut">
            <svg class="viz-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="9" opacity="0.35" />
              <circle cx="12" cy="12" r="4.5" />
            </svg>
          </button>
        </div>
        <div id="aggregation-toolbar" class="aggregation-toolbar" hidden>
          <span class="aggregation-label">Across labels</span>
          <div class="aggregation-buttons">
            <button type="button" data-aggregation="sum" title="Total per series">Sum</button>
            <button type="button" data-aggregation="average" title="Mean per series">Average</button>
          </div>
        </div>
        <p id="hint">Waiting for tool input from the host…</p>
        <div class="chart-wrap">
          <canvas id="chart" aria-label="Chart canvas"></canvas>
        </div>
        <div class="table-toggle-bar">
          <button type="button" id="table-toggle" aria-expanded="false" aria-controls="data-table-wrap">
            <svg class="viz-icon viz-icon--sm" viewBox="0 0 24 24" aria-hidden="true">
              <path
                fill="currentColor"
                d="M4 5h16v3H4V5zm0 5h7v9H4v-9zm9 0h7v4h-7v-4zm0 5h7v4h-7v-4z"
              />
            </svg>
            <span>Show Data</span>
          </button>
        </div>
        <div id="data-table-wrap" class="data-table-wrap" hidden>
          <table class="data-table" id="data-table">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
    <script type="module" src="/src/index.js"></script>
  </body>
</html>
